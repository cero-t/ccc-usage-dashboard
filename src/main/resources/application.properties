quarkus.analytics.disabled=true
quarkus.banner.enabled=false

# Keep the native macOS artifact short and stable: target/ccc-usage-dashboard.
quarkus.package.output-name=ccc-usage-dashboard
quarkus.package.jar.add-runner-suffix=false
quarkus.package.main-class=cero.ninja.ccc.bootstrap.CccUsageDashboardMain

quarkus.http.port=4318
quarkus.http.host=127.0.0.1
quarkus.grpc.server.port=4317
quarkus.grpc.server.host=127.0.0.1
# opentelemetry-proto ships no Jandex index, so without this Quarkus cannot see
# that OtlpGrpcReceiver extends the generated service bases and silently skips
# starting the gRPC server.
quarkus.index-dependency.otel-proto.group-id=io.opentelemetry.proto
quarkus.index-dependency.otel-proto.artifact-id=opentelemetry-proto
quarkus.log.category."io.quarkus".level=INFO
quarkus.log.file.enabled=${ccc-usage-dashboard.default-log-file-enabled:true}
quarkus.log.file.path=${ccc-usage-dashboard.default-log-file-path:${user.home}/.ccc-usage-dashboard/logs/ccc-usage-dashboard.log}

quarkus.datasource.db-kind=other
quarkus.datasource.jdbc.driver=org.sqlite.JDBC
quarkus.datasource.jdbc.url=${ccc-usage-dashboard.default-jdbc-url:jdbc:sqlite:${user.home}/.ccc-usage-dashboard/data/ccc-usage-dashboard.sqlite?journal_mode=WAL&busy_timeout=10000}
quarkus.datasource.jdbc.min-size=1
quarkus.datasource.jdbc.max-size=1

# Codex's own SQLite DBs, opened read-only by the annotate job.
codex.db.dir=${user.home}/.codex
# Read-only open is retried on the open handshake (SQLITE_CANTOPEN) while Codex
# is mid-write; busy_timeout only covers locks *after* the file is open.
codex.open.timeout-ms=5000
codex.open.retries=2
codex.open.backoff-ms=500
# Codex CLI invoked by the usage job (app-server stdio rateLimits read).
codex.bin=codex
codex.usage.timeout-ms=15000

# Tool-specific ingestion flags. Disabling Codex also skips Codex usage polling.
ccc-usage-dashboard.codex.enabled=${CODEX_USAGE_DASHBOARD_CODEX_ENABLED:true}
ccc-usage-dashboard.claude.enabled=${CODEX_USAGE_DASHBOARD_CLAUDE_ENABLED:true}

# Receive-time filter: OTLP log records whose event.kind matches this regex are
# discarded before storage. Codex streaming deltas carry no token usage and at
# high volume can outpace the annotate job's batch throughput.
ccc-usage-dashboard.ingest.drop-event-kinds=${CODEX_USAGE_DASHBOARD_INGEST_DROP_EVENT_KINDS:^response\\..+\\.delta$}

# Scheduled job cadence (both independent, 1 minute by default).
ccc-usage-dashboard.annotate.every=${CODEX_USAGE_DASHBOARD_ANNOTATE_EVERY:60s}
ccc-usage-dashboard.annotate.batch-size=${CODEX_USAGE_DASHBOARD_ANNOTATE_BATCH_SIZE:500}
ccc-usage-dashboard.usage.every=${CODEX_USAGE_DASHBOARD_USAGE_EVERY:60s}
ccc-usage-dashboard.retention.every=${CODEX_USAGE_DASHBOARD_RETENTION_EVERY:1h}
ccc-usage-dashboard.retention.otel-log-records=${CODEX_USAGE_DASHBOARD_RETENTION_OTEL_LOG_RECORDS:14d}
ccc-usage-dashboard.retention.annotated-events=${CODEX_USAGE_DASHBOARD_RETENTION_ANNOTATED_EVENTS:365d}
ccc-usage-dashboard.retention.usage-samples=${CODEX_USAGE_DASHBOARD_RETENTION_USAGE_SAMPLES:365d}
